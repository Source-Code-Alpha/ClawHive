<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#06060f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Agent Command Center</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Animated background layers -->
  <div class="bg-mesh"></div>
  <canvas id="particles" class="particles-canvas"></canvas>
  <div class="noise-overlay"></div>

  <!-- Main app container -->
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo-mark">
          <div class="logo-ring"></div>
          <span class="logo-icon">&#x2726;</span>
        </div>
        <div class="logo-text-group">
          <h1 class="logo-text">Command Center</h1>
          <span class="logo-sub">ai.nuc</span>
        </div>
      </div>
      <div class="header-center">
        <div class="filter-chips" id="filter-chips">
          <button class="chip active" data-filter="all">All</button>
          <button class="chip" data-filter="engineering">Engineering</button>
          <button class="chip" data-filter="operations">Operations</button>
          <button class="chip" data-filter="social">Social</button>
          <button class="chip" data-filter="research">Research</button>
          <button class="chip" data-filter="personal">Personal</button>
          <button class="chip" data-filter="active">Active</button>
        </div>
      </div>
      <div class="header-right">
        <div class="header-controls">
          <button class="icon-btn" id="view-toggle" title="Toggle compact view" onclick="toggleViewMode()">☰</button>
          <button class="icon-btn" id="theme-toggle" title="Cycle theme" onclick="cycleTheme()">◑</button>
        </div>
        <div class="session-counter">
          <span class="pulse-dot"></span>
          <span id="session-count">0</span><span class="session-max"> / 8</span>
        </div>
        <kbd class="kbd-hint" title="Focus search">/</kbd>
      </div>
    </header>

    <!-- Stats bar (#3) -->
    <div id="stats-bar" class="stats-bar" style="display:none"></div>

    <!-- Dashboard view -->
    <div id="dashboard-view" class="view active">
      <div class="search-row">
        <div class="search-bar">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="agent-search" placeholder="Search agents... ( / )" autocomplete="off" spellcheck="false">
        </div>
        <select id="sort-select" class="sort-select" onchange="changeSort(this.value)">
          <option value="name">A-Z</option>
          <option value="category">Category</option>
          <option value="topics">Topics</option>
        </select>
      </div>
      <!-- Skeleton loading -->
      <div id="skeleton-grid" class="agent-grid">
        <div class="agent-card skeleton"><div class="skeleton-emoji"></div><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div></div>
        <div class="agent-card skeleton"><div class="skeleton-emoji"></div><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div></div>
        <div class="agent-card skeleton"><div class="skeleton-emoji"></div><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div></div>
        <div class="agent-card skeleton"><div class="skeleton-emoji"></div><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div></div>
        <div class="agent-card skeleton"><div class="skeleton-emoji"></div><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div></div>
        <div class="agent-card skeleton"><div class="skeleton-emoji"></div><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div></div>
      </div>
      <!-- Recent Sessions (#8) -->
      <div id="recent-sessions" class="recent-sessions" style="display:none">
        <div class="recent-header">
          <span class="category-label" style="color:var(--text-muted)">Recent Sessions</span>
          <div class="category-line"></div>
        </div>
        <div id="recent-sessions-list" class="recent-list"></div>
      </div>
      <div id="agent-grid" class="agent-grid" style="display:none"></div>
    </div>

    <!-- Agent Detail Panel (#3) -->
    <div id="agent-detail" class="detail-panel">
      <div class="detail-header">
        <span id="detail-emoji" class="detail-emoji"></span>
        <div>
          <div id="detail-name" class="detail-name"></div>
          <div id="detail-role" class="detail-role"></div>
        </div>
        <button class="detail-close" onclick="closeDetailPanel()">&#215;</button>
      </div>
      <div id="detail-vibe" class="detail-vibe"></div>
      <div class="detail-section">
        <div class="detail-label">Topics</div>
        <div id="detail-topics" class="detail-topics"></div>
      </div>
      <div class="detail-section">
        <div class="detail-label">Category</div>
        <div id="detail-category" class="detail-category-val"></div>
      </div>
      <button id="detail-launch" class="detail-launch-btn">Launch Session</button>
    </div>

    <!-- Terminal view -->
    <div id="terminal-view" class="view">
      <div class="terminal-header" id="terminal-header-bar">
        <!-- Breadcrumbs (#10) -->
        <nav class="breadcrumbs">
          <button class="breadcrumb-link" onclick="showDashboard()">Dashboard</button>
          <span class="breadcrumb-sep">/</span>
          <span id="breadcrumb-agent" class="breadcrumb-current"></span>
          <span id="breadcrumb-topic-sep" class="breadcrumb-sep" style="display:none">/</span>
          <span id="breadcrumb-topic" class="breadcrumb-topic"></span>
        </nav>
        <div class="terminal-actions">
          <button class="icon-btn" onclick="toggleTerminalSearch()" title="Search (Ctrl+F)">🔍</button>
          <button class="icon-btn" id="autoscroll-btn" onclick="toggleAutoScroll()" title="Auto-scroll">⬇</button>
          <button class="icon-btn" onclick="exportSession()" title="Export output">💾</button>
          <button class="kill-btn" onclick="killCurrentSession()" title="End session">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            End
          </button>
        </div>
      </div>
      <!-- Terminal search bar (#13) -->
      <div id="terminal-search-bar" class="terminal-search-bar" style="display:none">
        <input id="terminal-search-input" type="text" placeholder="Search in terminal..." autocomplete="off" spellcheck="false">
        <span id="terminal-search-count" class="search-count"></span>
        <button onclick="termSearchPrev()">▲</button>
        <button onclick="termSearchNext()">▼</button>
        <button onclick="closeTerminalSearch()">✕</button>
      </div>
      <div id="terminal-container"></div>
    </div>

    <!-- Session tabs (bottom bar) -->
    <div id="session-tabs" class="session-tabs"></div>
  </div>

  <!-- Topic modal -->
  <div id="topic-modal" class="modal-overlay" onclick="closeTopicModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h3 id="topic-modal-title"></h3>
      <p class="modal-subtitle">Select a topic or launch without one</p>
      <div id="topic-list" class="topic-list"></div>
      <button class="topic-btn topic-btn-default" onclick="launchAgent(selectedAgentId)">
        Launch general session
      </button>
    </div>
  </div>

  <!-- Command Palette (#1) -->
  <div id="palette-overlay" class="palette-overlay">
    <div class="palette-box">
      <input id="palette-input" class="palette-input" type="text" placeholder="Search agents, topics, commands..." autocomplete="off" spellcheck="false">
      <div id="palette-list" class="palette-list"></div>
    </div>
  </div>

  <!-- Keyboard Shortcuts Overlay (#9) -->
  <div id="shortcuts-overlay" class="modal-overlay" onclick="toggleShortcutsOverlay()">
    <div class="modal-content shortcuts-content" onclick="event.stopPropagation()">
      <h3>Keyboard Shortcuts</h3>
      <div class="shortcut-grid">
        <div class="shortcut-row"><kbd>/</kbd><span>Focus search</span></div>
        <div class="shortcut-row"><kbd>Ctrl+K</kbd><span>Command palette</span></div>
        <div class="shortcut-row"><kbd>Esc</kbd><span>Back to dashboard / close</span></div>
        <div class="shortcut-row"><kbd>Ctrl+1-8</kbd><span>Switch session tabs</span></div>
        <div class="shortcut-row"><kbd>?</kbd><span>This help</span></div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-search@0.15.0/lib/addon-search.min.js"></script>
  <script src="/js/particles.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/command-palette.js"></script>
</body>
</html>
